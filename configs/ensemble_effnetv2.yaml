# Ensemble member B: EfficientNetV2-S backbone with CORN + CBAM.
# Trained through the identical 3-phase pipeline as full_method.yaml,
# same data splits, same norm-stats — only the backbone differs.
# Produces a separate checkpoint namespace (ensemble_effnetv2_best.pt).

run_name: "ensemble_effnetv2"
checkpoint_dir: "saved/checkpoints"
log_dir: "saved/logs"
ema_decay: 0.999

loss_type: "corn"
use_class_weighting: true
use_mixup: true

model:
  arch: "efficientnetv2_s"
  pretrained: true
  use_cbam: true
  cbam_num_stages: 2
  num_thresholds: 4
  head_hidden_dim: 512
  dropout: 0.4

phases:
  phase1_frozen:
    manifest_train: "data/splits/eyepacs_train.csv"
    manifest_val: "data/splits/eyepacs_val.csv"
    norm_stats: "data/processed/eyepacs_norm_stats.json"
    freeze_backbone: true
    aug_strength: "light"
    batch_size: 512 # frozen backbone = no gradient memory
    num_epochs:
      10 # was 5 — cosine decay was killing LR before the
      # head escaped majority-class ("No DR") collapse;
      # QWK stayed ~0 for all 5 epochs across 3 runs.
    head_lr: 0.001
    warmup_epochs:
      2 # was 1 — only 1 epoch near peak LR wasn't enough
      # for a random-init head on frozen features.
    scheduler:
      "plateau" # was cosine — cosine decays on a fixed clock
      # regardless of whether the head has started
      # discriminating classes yet; plateau only
      # decays once val_loss actually stalls, so the
      # head keeps a useful LR for as long as it needs.

  phase2_full_training:
    manifest_train: "data/splits/eyepacs_train.csv"
    manifest_val: "data/splits/eyepacs_val.csv"
    norm_stats: "data/processed/eyepacs_norm_stats.json"
    freeze_backbone: false
    aug_strength: "light"
    batch_size: 64 # profiled at 9.06GB peak on 12GB VRAM
    num_epochs: 35
    head_lr: 0.000163 # sqrt-scaled from 1e-4 at bs=24 → bs=64
    backbone_lr: 0.0000163 # sqrt-scaled from 1e-5
    weight_decay: 0.01
    warmup_epochs: 2
    scheduler: "cosine"
    min_epochs: 10
    overfitting_patience: 10

  phase3_aptos:
    manifest_train: "data/splits/aptos_train.csv"
    manifest_val: "data/splits/aptos_val.csv"
    norm_stats: "data/processed/aptos_norm_stats.json"
    freeze_backbone: false
    aug_strength: "heavy"
    batch_size: 32
    num_epochs: 20
    head_lr: 0.0001
    backbone_lr: 0.000001
    warmup_epochs: 1
    scheduler: "plateau"
    overfitting_patience: 0
